# ============================================================
# Deploy Infrastructure
# Runs: terraform plan on every PR, terraform apply on merge to main
# ============================================================
name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infrastructure/terraform/**"
  pull_request:
    branches: [main]
    paths:
      - "infrastructure/terraform/**"
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC authentication to AWS
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Authenticate to AWS using OIDC (no static credentials)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      # 3. Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      # 4. Initialise with remote S3 backend
      # backend.hcl contains: bucket, key, region, dynamodb_table
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=onetogether/production/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      # 5. Validate syntax
      - name: Terraform Validate
        run: terraform validate

      # 6. Plan — always runs (on PR and push)
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color \
            -var="domain_name=${{ secrets.DOMAIN_NAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -out=tfplan 2>&1 | tee /tmp/plan.txt
          exit ${PIPESTATUS[0]}
        continue-on-error: true

      # 7. Always print plan output to logs (visible on push AND pull_request)
      - name: Show plan output
        if: always()
        run: |
          echo "=== Terraform Plan Output ==="
          cat /tmp/plan.txt || echo "(no plan output captured)"

      # 8. Post plan output as PR comment so reviewers can see changes
      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const plan = fs.existsSync('/tmp/plan.txt')
              ? fs.readFileSync('/tmp/plan.txt', 'utf8').slice(0, 60000)
              : '(no output)';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan\n\`\`\`\n${plan}\n\`\`\``
            });

      # 9. Fail if plan failed
      - name: Check Plan Result
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # 9. Apply only on push to main (not on PR)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
