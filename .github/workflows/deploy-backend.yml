# ============================================================
# Deploy Backend
# Builds the NestJS Docker image, pushes to ECR, updates the
# K8s Deployment image tag so ArgoCD picks it up automatically.
# ============================================================
name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "infrastructure/k8s/backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:     ap-southeast-1
  ECR_REPOSITORY: onetogether-production-backend   # Must match Terraform ecr.tf

jobs:
  build-and-deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. OIDC auth to AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Log in to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build the Docker image
      # The image tag includes the git SHA for traceability
      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker build \
            -f apps/backend/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

      # 5. Push both tags (SHA + latest) to ECR
      - name: Push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 6. Update kubectl config for the EKS cluster
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name onetogether-production \
            --region ${{ env.AWS_REGION }}

      # 7. Fetch runtime values from Terraform outputs / AWS
      - name: Fetch Terraform outputs
        id: tf-outputs
        run: |
          SQS_URL=$(aws sqs get-queue-url --queue-name onetogether-production-incident-events --query QueueUrl --output text)
          EB_BUS=$(aws events list-event-buses --query "EventBuses[?Name=='onetogether-production-events'].Name" --output text)
          SNS_ARN=$(aws sns list-topics --query "Topics[?ends_with(TopicArn,'onetogether-production-emergency-alerts')].TopicArn | [0]" --output text)
          echo "SQS_URL=$SQS_URL"     >> $GITHUB_OUTPUT
          echo "EB_BUS=$EB_BUS"       >> $GITHUB_OUTPUT
          echo "SNS_ARN=$SNS_ARN"     >> $GITHUB_OUTPUT

      # 8. Fetch DB + Cache credentials from Secrets Manager and create K8s Secret
      - name: Create K8s secrets from AWS Secrets Manager
        env:
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID:    ${{ secrets.COGNITO_CLIENT_ID }}
        run: |
          DB_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id onetogether-production/database \
            --query SecretString --output text)
          CACHE_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id onetogether-production/cache \
            --query SecretString --output text)

          DB_URL=$(echo $DB_SECRET | python3 -c "import sys,json; print(json.load(sys.stdin)['url'])")
          REDIS_URL=$(echo $CACHE_SECRET | python3 -c "import sys,json; print(json.load(sys.stdin)['url'])")

          # Create/update K8s secret in the onetogether namespace
          kubectl create secret generic onetogether-secrets \
            --namespace onetogether \
            --from-literal=DATABASE_URL="$DB_URL" \
            --from-literal=REDIS_URL="$REDIS_URL" \
            --from-literal=COGNITO_USER_POOL_ID="$COGNITO_USER_POOL_ID" \
            --from-literal=COGNITO_CLIENT_ID="$COGNITO_CLIENT_ID" \
            --save-config --dry-run=client -o yaml | kubectl apply -f -

      # 9. Update ConfigMap with non-sensitive values
      - name: Update K8s ConfigMap
        run: |
          kubectl create configmap onetogether-config \
            --namespace onetogether \
            --from-literal=SQS_INCIDENT_QUEUE_URL="${{ steps.tf-outputs.outputs.SQS_URL }}" \
            --from-literal=EVENTBRIDGE_BUS_NAME="${{ steps.tf-outputs.outputs.EB_BUS }}" \
            --from-literal=SNS_ALERTS_TOPIC_ARN="${{ steps.tf-outputs.outputs.SNS_ARN }}" \
            --from-literal=AWS_REGION="ap-southeast-1" \
            --save-config --dry-run=client -o yaml | kubectl apply -f -

      # 10. Ensure namespace and base manifests exist (bootstrap if ArgoCD not yet running)
      - name: Apply base K8s manifests
        run: |
          kubectl apply -f infrastructure/k8s/namespace.yaml
          kubectl apply -f infrastructure/k8s/backend/

      # 11. Update the Deployment image tag
      - name: Update image tag
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          kubectl set image deployment/backend \
            backend=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --namespace onetogether

      # 12. Wait for rollout to complete
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend \
            --namespace onetogether \
            --timeout=300s
