# ============================================================
# Seed prod DB  (manual)
# Regenerates the seed-script + prisma-schema ConfigMaps from the
# CURRENT repo files, then runs the one-shot `seed-db` Job in-cluster
# (prisma db push + tsx prisma/seed.ts). Run this from the Actions tab
# after merging seed/schema changes to main.
#
# Because it checks out `main` on a Linux runner, the schema/seed are
# always origin/main with no UTF-8 BOM — no manual ConfigMap editing,
# no drift.
# ============================================================
name: Seed prod DB

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:   ap-southeast-1
  CLUSTER_NAME: onetogether-production
  NAMESPACE:    onetogether

jobs:
  seed:
    name: Re-seed production database
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      # Regenerate both ConfigMaps from the actual repo files so prod
      # seeds exactly what is in the repo (no inline/stale copy).
      - name: Refresh seed + schema ConfigMaps from repo
        run: |
          kubectl create configmap seed-script \
            --namespace ${{ env.NAMESPACE }} \
            --from-file=seed.ts=apps/backend/prisma/seed.ts \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create configmap prisma-schema \
            --namespace ${{ env.NAMESPACE }} \
            --from-file=schema.prisma=apps/backend/prisma/schema.prisma \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Run seed job
        run: |
          kubectl delete job seed-db --namespace ${{ env.NAMESPACE }} --ignore-not-found
          kubectl apply -f infrastructure/k8s/backend/seed-job.yaml

      - name: Wait for seed job to complete
        run: |
          set +e
          kubectl wait --for=condition=complete job/seed-db \
            --namespace ${{ env.NAMESPACE }} --timeout=300s
          STATUS=$?
          echo "=== seed-db logs ==="
          kubectl logs job/seed-db --namespace ${{ env.NAMESPACE }} --tail=100 || true
          if [ $STATUS -ne 0 ]; then
            echo "Seed job did not complete successfully."
            exit 1
          fi

      # Pick up any schema change in the running pods.
      - name: Restart backend rollout
        run: |
          kubectl rollout restart deployment/backend --namespace ${{ env.NAMESPACE }}
          kubectl rollout status deployment/backend --namespace ${{ env.NAMESPACE }} --timeout=300s
