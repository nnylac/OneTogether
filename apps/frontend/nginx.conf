# nginx config for serving the React SPA from a container.
# The CloudFront distribution calls index.html for all 404/403s,
# but this config handles it at the nginx layer too for direct access.

server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip compression for JS/CSS bundles (Vite already produces .gz in build)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets aggressively (Vite includes content hash in filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must NOT be cached — browser must always fetch the latest version
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store";
    }

    # React Router — send all unmatched paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
