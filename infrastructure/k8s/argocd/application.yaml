# ArgoCD Application — watches infrastructure/k8s/backend/ in the GitHub repo
# and syncs any changes to the EKS cluster automatically.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onetogether-backend
  namespace: argocd
  # Auto-delete this application if the ArgoCD app manifest is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Replace with your actual GitHub repo URL
    repoURL: https://github.com/nnylac/OneTogether.git
    targetRevision: main
    path: infrastructure/k8s/backend

  destination:
    server: https://kubernetes.default.svc
    namespace: onetogether

  syncPolicy:
    automated:
      prune: true      # Remove resources deleted from Git
      selfHeal: true   # Revert manual changes made directly to the cluster
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
