# ALB Ingress — creates an AWS Application Load Balancer via the
# aws-load-balancer-controller installed by Terraform
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: onetogether
  annotations:
    # Tell the ALB controller to create an internet-facing ALB
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    # HTTPS with the ACM cert created for api.yourdomain.com
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "${ACM_CERT_ARN}"

    # Enable access logging to S3 for audit trail
    alb.ingress.kubernetes.io/load-balancer-attributes: "access_logs.s3.enabled=true,access_logs.s3.bucket=onetogether-production-data-lake-${ACCOUNT_ID}"

    # Socket.IO long-polling requires every request carrying a given session id
    # (sid) to return to the same pod. With replicas > 1 and no stickiness the
    # Engine.IO handshake lands on pod A but the follow-up poll is balanced to
    # pod B, which rejects the unknown sid with HTTP 400. Duration-based ALB
    # cookie stickiness keeps a client pinned to one target. Cross-pod broadcast
    # is handled separately by the Socket.IO Redis adapter.
    alb.ingress.kubernetes.io/target-group-attributes: "stickiness.enabled=true,stickiness.type=lb_cookie,stickiness.lb_cookie.duration_seconds=86400"
spec:
  rules:
    - host: api.${DOMAIN_NAME}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
