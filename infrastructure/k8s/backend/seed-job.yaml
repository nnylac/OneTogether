# One-shot Job to push the Prisma schema and seed the production database.
#
# This manifest is ONLY the Job. It mounts two ConfigMaps:
#   - seed-script   (key seed.ts)      → apps/backend/prisma/seed.ts
#   - prisma-schema (key schema.prisma) → apps/backend/prisma/schema.prisma
#
# Those ConfigMaps are generated FROM THE REPO FILES by the
# `.github/workflows/seed-prod.yml` workflow (kubectl create configmap
# --from-file ...), so what runs in prod always matches the current repo.
# Do NOT inline the seed script here again — that caused drift where prod
# seeded a stale copy. Regenerate the ConfigMaps from the files instead.
#
# Step 1: prisma db push creates/syncs tables (schema from the mounted ConfigMap)
# Step 2: tsx runs prisma/seed.ts (orgs, demo users, broadcasts, communities,
#         alert rules, resources)
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-db
  namespace: onetogether
spec:
  template:
    spec:
      containers:
        - name: seed
          image: 461802173878.dkr.ecr.ap-southeast-1.amazonaws.com/onetogether-production-backend:latest
          workingDir: /app/apps/backend
          command: ["sh", "-c"]
          args:
            - |
              set -e
              # Append sslmode for pg adapter compatibility with RDS
              export DATABASE_URL="${DATABASE_URL}?sslmode=no-verify"
              echo "=== Step 1: Push Prisma schema ==="
              npx prisma db push --accept-data-loss --url "$DATABASE_URL" 2>&1
              echo "=== Step 2: Install tsx ==="
              npm install tsx --no-save 2>&1 | tail -1
              echo "=== Step 3: Run seed ==="
              npx tsx prisma/seed.ts
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: onetogether-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: seed-script
              mountPath: /app/apps/backend/prisma/seed.ts
              subPath: seed.ts
            - name: prisma-schema
              mountPath: /app/apps/backend/prisma/schema.prisma
              subPath: schema.prisma
      volumes:
        - name: seed-script
          configMap:
            name: seed-script
        - name: prisma-schema
          configMap:
            name: prisma-schema
      restartPolicy: Never
  backoffLimit: 2
