# HTTP-only ALB ingress for prototype use (no custom domain / ACM cert).
# Creates an internet-facing ALB whose DNS name you feed to CloudFront as the
# backend origin (var.backend_alb_domain). Use this INSTEAD of ingress.yaml when
# you have not configured a domain. CloudFront terminates HTTPS for viewers and
# talks to this ALB over HTTP, so the ALB itself needs no certificate.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: onetogether
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    # Route the ALB health check at the app's health endpoint
    alb.ingress.kubernetes.io/healthcheck-path: /api/health

    # Socket.IO long-polling requires every request carrying a given session id
    # (sid) to return to the same pod. With replicas > 1 and no stickiness the
    # Engine.IO handshake lands on pod A but a follow-up poll is balanced to pod
    # B, which rejects the unknown sid with HTTP 400 — breaking the incident-room
    # discussion. Duration-based ALB cookie stickiness pins each client to one
    # target. Cross-pod broadcast is handled by the Socket.IO Redis adapter.
    alb.ingress.kubernetes.io/target-group-attributes: "stickiness.enabled=true,stickiness.type=lb_cookie,stickiness.lb_cookie.duration_seconds=86400"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
