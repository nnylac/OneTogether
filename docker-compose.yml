services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "3000:80"
    # Override the nginx config so /api proxies to the backend container.
    # Production uses CloudFront for this routing — this replaces that locally.
    volumes:
      - ./apps/frontend/nginx.local.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
