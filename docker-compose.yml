services:
  db:
    build:
      context: apps/db
      dockerfile: Dockerfile
    ports:
      - "5434:5432"
    volumes:
      - one_together_data:/var/lib/postgresql

  # Default to the locally running backend. Override MIDDLEWARE_URL when the
  # backend is also containerized or deployed elsewhere.
  scenario-engine:
    build:
      context: apps/external
      dockerfile: scenario-engine/Dockerfile
    container_name: scenario-engine
    ports:
      - "8100:8000"
    networks:
      - sim-net
    restart: unless-stopped
    environment:
      MIDDLEWARE_URL: ${MIDDLEWARE_URL:-http://host.docker.internal:3001/api/incident-middleware}
      INTERVAL_SECONDS: ${INTERVAL_SECONDS:-240}
      PHASE_TIME_SCALE: ${PHASE_TIME_SCALE:-0.1}
      RANDOM_SEED: ${RANDOM_SEED:-}
      SPF_URL: http://spf:8000
      SCDF_URL: http://scdf:8000
      SINGHEALTH_URL: http://singhealth:8000
      NUHS_URL: http://nuhs:8000
      TOWNCOUNCIL_URL: http://towncouncil:8000
      PUB_URL: http://pub:8000
      NEA_URL: http://nea:8000
    depends_on:
      spf:
        condition: service_started
      scdf:
        condition: service_started
      singhealth:
        condition: service_started
      nuhs:
        condition: service_started
      towncouncil:
        condition: service_started
      pub:
        condition: service_started
      nea:
        condition: service_started

  spf:
    build:
      context: apps/external
      dockerfile: agencies/spf/Dockerfile
    container_name: spf
    ports:
      - "8101:8000"
    networks:
      - sim-net
    restart: unless-stopped
    environment:
      MIDDLEWARE_URL: ${MIDDLEWARE_URL:-http://host.docker.internal:3001/api/incident-middleware}
      AGENCY_UPDATE_MIN_SECONDS: ${AGENCY_UPDATE_MIN_SECONDS:-60}
      AGENCY_UPDATE_MAX_SECONDS: ${AGENCY_UPDATE_MAX_SECONDS:-120}

  scdf:
    build:
      context: apps/external
      dockerfile: agencies/scdf/Dockerfile
    container_name: scdf
    ports:
      - "8102:8000"
    networks:
      - sim-net
    restart: unless-stopped
    environment:
      MIDDLEWARE_URL: ${MIDDLEWARE_URL:-http://host.docker.internal:3001/api/incident-middleware}
      AGENCY_UPDATE_MIN_SECONDS: ${AGENCY_UPDATE_MIN_SECONDS:-60}
      AGENCY_UPDATE_MAX_SECONDS: ${AGENCY_UPDATE_MAX_SECONDS:-120}
      SINGHEALTH_URL: http://singhealth:8000
      NUHS_URL: http://nuhs:8000

  singhealth:
    build:
      context: apps/external
      dockerfile: agencies/singhealth/Dockerfile
    container_name: singhealth
    ports:
      - "8103:8000"
    networks:
      - sim-net
    restart: unless-stopped
    environment:
      MIDDLEWARE_URL: ${MIDDLEWARE_URL:-http://host.docker.internal:3001/api/incident-middleware}
      AGENCY_UPDATE_MIN_SECONDS: ${AGENCY_UPDATE_MIN_SECONDS:-60}
      AGENCY_UPDATE_MAX_SECONDS: ${AGENCY_UPDATE_MAX_SECONDS:-120}

  nuhs:
    build:
      context: apps/external
      dockerfile: agencies/nuhs/Dockerfile
    container_name: nuhs
    ports:
      - "8104:8000"
    networks:
      - sim-net
    restart: unless-stopped
    environment:
      MIDDLEWARE_URL: ${MIDDLEWARE_URL:-http://host.docker.internal:3001/api/incident-middleware}
      AGENCY_UPDATE_MIN_SECONDS: ${AGENCY_UPDATE_MIN_SECONDS:-60}
      AGENCY_UPDATE_MAX_SECONDS: ${AGENCY_UPDATE_MAX_SECONDS:-120}

  towncouncil:
    build:
      context: apps/external
      dockerfile: agencies/towncouncil/Dockerfile
    container_name: towncouncil
    ports:
      - "8105:8000"
    networks:
      - sim-net
    restart: unless-stopped
    environment:
      MIDDLEWARE_URL: ${MIDDLEWARE_URL:-http://host.docker.internal:3001/api/incident-middleware}
      AGENCY_UPDATE_MIN_SECONDS: ${AGENCY_UPDATE_MIN_SECONDS:-60}
      AGENCY_UPDATE_MAX_SECONDS: ${AGENCY_UPDATE_MAX_SECONDS:-120}

  pub:
    build:
      context: apps/external
      dockerfile: agencies/pub/Dockerfile
    container_name: pub
    ports:
      - "8106:8000"
    networks:
      - sim-net
    restart: unless-stopped
    environment:
      MIDDLEWARE_URL: ${MIDDLEWARE_URL:-http://host.docker.internal:3001/api/incident-middleware}
      AGENCY_UPDATE_MIN_SECONDS: ${AGENCY_UPDATE_MIN_SECONDS:-60}
      AGENCY_UPDATE_MAX_SECONDS: ${AGENCY_UPDATE_MAX_SECONDS:-120}

  nea:
    build:
      context: apps/external
      dockerfile: agencies/nea/Dockerfile
    container_name: nea
    ports:
      - "8107:8000"
    networks:
      - sim-net
    restart: unless-stopped
    environment:
      MIDDLEWARE_URL: ${MIDDLEWARE_URL:-http://host.docker.internal:3001/api/incident-middleware}
      AGENCY_UPDATE_MIN_SECONDS: ${AGENCY_UPDATE_MIN_SECONDS:-60}
      AGENCY_UPDATE_MAX_SECONDS: ${AGENCY_UPDATE_MAX_SECONDS:-120}

networks:
  sim-net:
    driver: bridge

volumes:
  one_together_data:
